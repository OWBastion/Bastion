name: Grant General Title

on:
  workflow_dispatch:
    inputs:
      player_name:
        description: 'Player name in data/title-source.json (玩家名)'
        required: true
        type: string
      general_title:
        description: 'General title key (通用称号)'
        required: true
        type: choice
        options:
          - PIONEER
          - TEST_LONG
          - NOT_MY_MAP
          - WILD_DEV
          - ARCHITECT
          - MAINTAINER
          - THREE_IN_ONE
          - BLACK_SHEEP
          - PURE_HARM
          - CONQUEROR
          - DOMINATOR
          - SURVIVOR_EXPERT
          - CHALLENGER_LEGEND
          - TRAVELER_HELL
          - DODGE_ULTIMATE
          - LIGHT_PACK
          - FLAWLESS
          - NEVER_GIVE_UP
          - PERSEVERANCE
          - SPEEDRUN
          - DODGE_GOD
          - ZENYATTA
          - HARD_TO_KILL
          - WIN_HEAVEN
          - IDOL
          - EGG_FIRST
          - EAT_MORE
          - ALL_IN_ONE
          - TRAVELER
          - SKY
          - FLAME
          - PASS_EGGS
          - CHOSEN
          - LUCKY_STAR
          - GAMBLE_KING
          - LUCKY_SHINE
          - UNLUCKY
          - MANBA
          - MY_FATE
          - GOD_GAMBLER
          - LAO_DA
          - V_50
          - STEEL
          - HACKING
          - RED_PACKET
          - GOOD_LUCK
          - LONE_WALKER
          - GREEN_MOUNTAIN
          - SUAN_BU_LA
      dry_run:
        description: 'Preview only (do not create PR)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: grant-general-title-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  grant:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Singapore

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Grant general title
        shell: bash
        run: |
          set -euo pipefail
          cmd=(
            node tools/grant-player-title.mjs
            --player-name "${{ inputs.player_name }}"
            --general-title "${{ inputs.general_title }}"
            --fail-on-missing-player
          )

          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            cmd+=(--dry-run)
          fi

          "${cmd[@]}"

      - name: Detect title-related changes
        id: changed
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- data/title-source.json src/title/title-cn.opy web/title-query/public/data/titles.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No title-related file changes detected."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Title-related changes detected:"
            git diff --name-only -- data/title-source.json src/title/title-cn.opy web/title-query/public/data/titles.json
          fi

      - name: Create pull request for title grant
        if: ${{ inputs.dry_run != true && steps.changed.outputs.changed == 'true' }}
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/grant-general-title-${{ github.run_id }}
          base: main
          delete-branch: true
          commit-message: |
            chore(title): grant ${{ inputs.general_title }} to ${{ inputs.player_name }}

            source: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          title: chore(title): grant ${{ inputs.general_title }} to ${{ inputs.player_name }}
          body: |
            Automated title grant request.

            - Player: `${{ inputs.player_name }}`
            - General title: `${{ inputs.general_title }}`
            - Trigger: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            This PR was generated by `.github/workflows/grant-general-title.yml`.
          add-paths: |
            data/title-source.json
            src/title/title-cn.opy
            web/title-query/public/data/titles.json

      - name: Run summary
        shell: bash
        run: |
          echo "dry_run=${{ inputs.dry_run }}"
          echo "changed=${{ steps.changed.outputs.changed }}"
          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            echo "Dry run mode: PR creation skipped by design."
          elif [[ "${{ steps.changed.outputs.changed }}" != "true" ]]; then
            echo "No effective changes: PR creation skipped."
          fi
