          - '墙上静止的钟'
          - '我踏马真不会打啊'
          - 'Doretta'
          - '污污污快上车'
          - '小聋瞎'
          # END AUTO-GENERATED PLAYER OPTIONS
      general_title_label:
        description: 'General title label in Chinese (中文称号)'
        required: true
        type: choice
        options:
          # BEGIN AUTO-GENERATED GENERAL TITLE OPTIONS
          - '终极闪避'
          - '轻装上阵'
          - '完美无缺'
          - '坚韧不拔'
          - '速通传奇'
          - '胜天半子'
          - '万象归一'
